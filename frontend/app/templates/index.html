<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema Climático</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{

            background: linear-gradient(135deg,#0f172a,#1e293b);

            color:white;

            min-height:100vh;

            padding:40px;
        }

        h1{

            text-align:center;

            margin-bottom:40px;

            font-size:40px;
        }

        .contenedor{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:30px;
        }

        .card{

            background:#1e293b;

            border-radius:20px;

            padding:30px;

            box-shadow:0px 10px 25px rgba(0,0,0,0.4);

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-5px);
        }

        .card h2{

            margin-bottom:20px;

            color:#38bdf8;
        }

        .item{

            background:#334155;

            margin-bottom:15px;

            padding:15px;

            border-radius:12px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            font-size:18px;
        }

        .temperatura{

            font-weight:bold;

            color:#facc15;
        }

        @media(max-width:900px){

            .contenedor{

                grid-template-columns:1fr;
            }
        }

    </style>

</head>

<body>

    <h1>Sistema Climático Distribuido</h1>

    <div class="contenedor">

        <div class="card">

            <h2>Datos almacenados en MySQL</h2>

            {% for ciudad in ciudades %}

            <div class="item">

                <span>{{ ciudad.nombre }}</span>

                <span class="temperatura">
                    {{ ciudad.temperatura }}°C
                </span>

            </div>

            {% endfor %}

        </div>

        <div class="card">

            <h2>Consulta Concurrente API Clima</h2>

            {% for clima in climas %}

            <div class="item">

                <span>{{ clima.ciudad }}</span>

                <span class="temperatura">
                    {{ clima.temperatura }}°C
                </span>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
