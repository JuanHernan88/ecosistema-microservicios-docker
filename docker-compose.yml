services:

  mysql:
    image: mysql:8.0

    container_name: mysql_nube

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - red_microservicios

  nginx:
    image: nginx:latest

    container_name: nginx_proxy

    ports:
      - "3308:3306"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - mysql

    networks:
      - red_microservicios

  worker:
    build: ./worker

    container_name: worker_backup

    depends_on:
      - nginx

    volumes:
      - ./backups:/app/backups

    networks:
      - red_microservicios
    
  frontend:
    build: ./frontend

    container_name: frontend_app

    ports:
      - "5000:5000"

    depends_on:
      - nginx

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

    networks:
      - red_microservicios

volumes:
  mysql_data:

networks:
  red_microservicios:
    

